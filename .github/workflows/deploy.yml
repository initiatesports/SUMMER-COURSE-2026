name: Deploy Apps Script backend

# 只有後端程式碼(apps-script/**)有改動時才跑;改前端 HTML 由 GitHub Pages 自行處理,不會誤觸這裡。
on:
  push:
    branches: [main]
    paths:
      - "apps-script/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {} # 也可在 Actions 頁面手動觸發

concurrency:
  group: deploy-apps-script
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install clasp
        run: npm install -g @google/clasp@3

      - name: Write clasp auth
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: printf '%s' "$CLASPRC_JSON" > "$HOME/.clasprc.json"

      # #10 暑期班報名後端 → 更新同一個 deployment,/exec 網址不變
      - name: Deploy booking-form (#10)
        working-directory: apps-script/booking-form
        run: |
          clasp push -f
          clasp deploy -i AKfycbwRW3PBA6GA0I7AvHOdPVPkpsAl-Qi2vvmz-MDUtLGX4Vw0mI9whfkwXb6ddMgGZOU -d "CI ${GITHUB_SHA::7}"
